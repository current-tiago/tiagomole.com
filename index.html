<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tiago branco mole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #FF2400;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: white;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
        }
        
        .container {
            text-align: center;
            max-width: 600px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        h1 {
            font-size: 3.5rem;
            font-weight: 300;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
            text-transform: lowercase;
            transition: transform 0.3s ease;
        }
        
        h1:hover {
            transform: scale(1.05);
        }
        
        .tagline {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 2rem;
            opacity: 0.9;
            text-transform: lowercase;
            transition: transform 0.3s ease;
        }
        
        .tagline:hover {
            transform: scale(1.05);
        }
        
        .description {
            font-size: 1rem;
            font-weight: 300;
            margin-bottom: 3rem;
            opacity: 0.8;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            text-transform: lowercase;
            transition: transform 0.3s ease;
        }
        
        .description:hover {
            transform: scale(1.05);
        }
        
        .contact {
            font-size: 0.9rem;
            font-weight: 300;
            opacity: 0.7;
            text-transform: lowercase;
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }
        
        .contact:hover {
            transform: scale(1.05);
        }
        
        .work-link {
            font-size: 1rem;
            font-weight: 300;
            text-transform: lowercase;
            color: white;
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            margin-top: auto;
            padding-bottom: 0.1rem;
            opacity: 0.8;
            transition: opacity 0.3s ease, border-bottom 0.3s ease, transform 0.3s ease;
        }
        
        .work-link:hover {
            opacity: 1;
            border-bottom-color: white;
            transform: scale(1.05);
        }
        
        a {
            color: white;
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            transition: border-color 0.3s ease;
        }
        
        a:hover {
            border-bottom-color: white;
        }
        
        #now-playing {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 999px;
            padding: 0.5rem 0.9rem 0.5rem 0.5rem;
            text-decoration: none;
            border-bottom: none;
            opacity: 0;
            transition: opacity 0.5s ease, transform 0.3s ease;
            max-width: 220px;
        }

        #now-playing.visible {
            opacity: 1;
        }

        #now-playing:hover {
            transform: scale(1.04);
            border-bottom: none;
        }

        #now-playing img {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        #now-playing .np-text {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #now-playing .np-label {
            font-size: 0.6rem;
            opacity: 0.6;
            text-transform: lowercase;
            letter-spacing: 0.05em;
        }

        #now-playing .np-title {
            font-size: 0.75rem;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: lowercase;
        }

        #now-playing .np-artist {
            font-size: 0.65rem;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: lowercase;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .tagline {
                font-size: 1rem;
            }
            
            .description {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- Normal site content -->
    <div class="container">
        <h1>tiago branco mole</h1>
        <div class="tagline">aspiring economist & entrepreneur</div>
        <div class="description">
            writing about macroeconomics and history, exploring the intersections of finance, politics and human thought
        </div>
        <div class="contact">
            <a href="mailto:tiagobrancomole@gmail.com">tiagobrancomole@gmail.com</a>
        </div>
    </div>
    <a href="work.html" class="work-link">view past articles</a>

    <a id="now-playing" href="#" target="_blank" rel="noopener" style="display:none">
        <img id="np-art" src="" alt="album art">
        <div class="np-text">
            <span class="np-label">listening now</span>
            <span class="np-title" id="np-title"></span>
            <span class="np-artist" id="np-artist"></span>
        </div>
    </a>

    <script>
        async function fetchNowPlaying() {
            try {
                const res = await fetch('/.netlify/functions/now-playing');
                const data = await res.json();
                if (data.isPlaying) {
                    const widget = document.getElementById('now-playing');
                    document.getElementById('np-title').textContent = data.title;
                    document.getElementById('np-artist').textContent = data.artist;
                    document.getElementById('np-art').src = data.albumArt;
                    widget.href = data.songUrl;
                    widget.style.display = 'flex';
                    setTimeout(() => widget.classList.add('visible'), 50);
                }
            } catch (e) {}
        }
        fetchNowPlaying();
        setInterval(fetchNowPlaying, 30000);

        // Check URL for secret key
        const urlParams = new URLSearchParams(window.location.search);
        const editMode = urlParams.get('edit');
        const secretKey = urlParams.get('key');
        const SECRET_KEY = 'tiago2024';
        
        // Check if editor mode should be enabled
        if (editMode === 'true' && secretKey === SECRET_KEY) {
            console.log('Editor mode activated via URL');
            
            // Add editor mode class to body for styling
            document.body.classList.add('editor-mode');
            
            // Make certain elements editable without visual changes
            const editableElements = document.querySelectorAll('h1, .tagline, .description');
            editableElements.forEach(element => {
                element.contentEditable = true;
                element.style.cursor = 'text';
            });
            
            // Preserve URL parameters in all links
            const links = document.querySelectorAll('a');
            links.forEach(link => {
                const href = link.getAttribute('href');
                if (href && !href.startsWith('http') && !href.startsWith('mailto:')) {
                    link.href = `${href}?edit=true&key=tiago2024`;
                }
            });
        } else {
            console.log('Normal mode - no valid editor key');
        }
    </script>
</body>
</html>
